<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administração</title>
    <link rel="stylesheet" href="./assets/css/loginAdm.css">
</head>
<body>
    <main class="login">
        <div class="login-container">
            <h1 class="login-title">Login Administração</h1>
            <form class="login-form">
                <input class="login-input" type="email" placeholder="e-mail">
               
                <input class="login-input" type="password" placeholder="senha">
                <a class="recuperar-senha" href="#">Esqueci a senha</a>
                <button class="login-submit">Entrar</button>
                
            </form>
        </div>
    </main>
</body>
</html>
